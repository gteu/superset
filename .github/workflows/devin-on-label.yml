name: Devin Maintenance Remediation

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  dispatch-to-devin:
    if: ${{ github.event.label.name == 'devin-ready' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pydantic pydantic-settings httpx

      - name: Run policy engine and dispatch
        id: dispatch
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          DEVIN_PLAYBOOK_ID: ${{ secrets.DEVIN_PLAYBOOK_ID }}
          DEVIN_PLAYBOOK_ID_DEEP: ${{ secrets.DEVIN_PLAYBOOK_ID_DEEP }}
          DEVIN_KNOWLEDGE_ID: ${{ secrets.DEVIN_KNOWLEDGE_ID }}
          DEVIN_KNOWLEDGE_ID_TESTING: ${{ secrets.DEVIN_KNOWLEDGE_ID_TESTING }}
          DEVIN_KNOWLEDGE_ID_SECURITY: ${{ secrets.DEVIN_KNOWLEDGE_ID_SECURITY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
        run: |
          python -c "
          import asyncio, json, os, sys
          sys.path.insert(0, '.')
          os.environ.setdefault('GITHUB_TOKEN', os.environ.get('GITHUB_TOKEN', ''))

          from app.policy import evaluate_issue
          from app.models import PolicyVerdict

          title = os.environ['ISSUE_TITLE']
          body = os.environ.get('ISSUE_BODY', '')
          labels = json.loads(os.environ.get('ISSUE_LABELS', '[]'))
          issue_num = os.environ['ISSUE_NUMBER']

          decision = evaluate_issue(title, body, labels)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'verdict={decision.verdict.value}\n')
              f.write(f'reason={decision.reason}\n')
              f.write(f'playbook={decision.playbook}\n')
              f.write(f'max_acu={decision.max_acu}\n')
              f.write(f'extra_knowledge={json.dumps(decision.extra_knowledge)}\n')
          "

      - name: Comment rejection on issue
        if: steps.dispatch.outputs.verdict == 'reject'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="**Policy rejected**: ${{ steps.dispatch.outputs.reason }}

          This issue will not be dispatched to Devin until the criteria are met.

          Please add acceptance criteria describing the expected behavior after the fix."

      - name: Comment escalation on issue
        if: steps.dispatch.outputs.verdict == 'escalate'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="**Escalated**: ${{ steps.dispatch.outputs.reason }}

          This issue requires human approval before Devin dispatch."

      - name: Create Devin session
        if: steps.dispatch.outputs.verdict == 'accept'
        id: devin
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          DEVIN_PLAYBOOK_ID: ${{ secrets.DEVIN_PLAYBOOK_ID }}
          DEVIN_PLAYBOOK_ID_DEEP: ${{ secrets.DEVIN_PLAYBOOK_ID_DEEP }}
          DEVIN_KNOWLEDGE_ID: ${{ secrets.DEVIN_KNOWLEDGE_ID }}
          DEVIN_KNOWLEDGE_ID_TESTING: ${{ secrets.DEVIN_KNOWLEDGE_ID_TESTING }}
          DEVIN_KNOWLEDGE_ID_SECURITY: ${{ secrets.DEVIN_KNOWLEDGE_ID_SECURITY }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY=$(jq -r '.issue.body // ""' "$GITHUB_EVENT_PATH")
          PLAYBOOK="${{ steps.dispatch.outputs.playbook }}"
          MAX_ACU="${{ steps.dispatch.outputs.max_acu }}"
          EXTRA_KNOWLEDGE='${{ steps.dispatch.outputs.extra_knowledge }}'

          # Select playbook ID based on policy decision
          if [ "$PLAYBOOK" = "deep-investigation" ] && [ -n "$DEVIN_PLAYBOOK_ID_DEEP" ]; then
            SELECTED_PLAYBOOK="$DEVIN_PLAYBOOK_ID_DEEP"
          else
            SELECTED_PLAYBOOK="$DEVIN_PLAYBOOK_ID"
          fi

          # Build knowledge IDs array based on policy decision
          KNOWLEDGE_IDS="[\"$DEVIN_KNOWLEDGE_ID\""
          if echo "$EXTRA_KNOWLEDGE" | grep -q "testing-patterns" && [ -n "$DEVIN_KNOWLEDGE_ID_TESTING" ]; then
            KNOWLEDGE_IDS="$KNOWLEDGE_IDS, \"$DEVIN_KNOWLEDGE_ID_TESTING\""
          fi
          if echo "$EXTRA_KNOWLEDGE" | grep -q "security-context" && [ -n "$DEVIN_KNOWLEDGE_ID_SECURITY" ]; then
            KNOWLEDGE_IDS="$KNOWLEDGE_IDS, \"$DEVIN_KNOWLEDGE_ID_SECURITY\""
          fi
          KNOWLEDGE_IDS="$KNOWLEDGE_IDS]"

          PROMPT="Fix the following issue in the repository ${{ github.repository }}:

          ## Issue #${ISSUE_NUM}: ${ISSUE_TITLE}

          ${ISSUE_BODY}

          ## Instructions
          - Investigate the codebase to understand the context
          - Implement a scoped fix
          - Run relevant tests if possible
          - Open a PR with a clear description, review focus areas, and any risks"

          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            --arg title "Issue #${ISSUE_NUM}: ${ISSUE_TITLE}" \
            --arg playbook_id "$SELECTED_PLAYBOOK" \
            --argjson knowledge_ids "$KNOWLEDGE_IDS" \
            --argjson max_acu "$MAX_ACU" \
            --arg repo "${{ github.repository }}" \
            --arg issue_tag "issue:${ISSUE_NUM}" \
            --arg complexity "complexity:${PLAYBOOK}" \
            '{
              prompt: $prompt,
              title: $title,
              playbook_id: $playbook_id,
              knowledge_ids: $knowledge_ids,
              repos: [$repo],
              tags: ["maintenance", "automated", ("repo:" + $repo), $issue_tag, $complexity],
              max_acu_limit: $max_acu,
              structured_output_schema: {
                "type": "object",
                "properties": {
                  "status": {"type": "string", "enum": ["success", "partial", "failed"]},
                  "files_changed": {"type": "array", "items": {"type": "string"}},
                  "tests_run": {"type": "boolean"},
                  "test_result": {"type": ["string", "null"]},
                  "pr_url": {"type": ["string", "null"]},
                  "risks": {"type": "array", "items": {"type": "string"}},
                  "review_focus": {"type": ["string", "null"]},
                  "needs_human_attention": {"type": "boolean"},
                  "failure_reason": {"type": ["string", "null"]},
                  "next_action": {"type": "string", "enum": ["review_pr", "rerun_with_more_context", "manual_investigation", "no_action"]}
                },
                "required": ["status", "files_changed", "tests_run", "needs_human_attention", "next_action"]
              },
              structured_output_required: true
            }')

          RESP=$(curl -fSs "https://api.devin.ai/v3/organizations/${DEVIN_ORG_ID}/sessions" \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          SESSION_ID=$(echo "$RESP" | jq -r '.session_id // .id // "unknown"')
          SESSION_URL=$(echo "$RESP" | jq -r '.url // "https://app.devin.ai/sessions/\(.session_id // .id // "")"')

          echo "session_id=$SESSION_ID" >> "$GITHUB_OUTPUT"
          echo "session_url=$SESSION_URL" >> "$GITHUB_OUTPUT"

      - name: Comment on issue with session link
        if: steps.dispatch.outputs.verdict == 'accept' && steps.devin.outputs.session_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -f body="**Devin session created** 🤖

          Session: ${{ steps.devin.outputs.session_url }}
          Policy: ${{ steps.dispatch.outputs.reason }}
          Playbook: ${{ steps.dispatch.outputs.playbook }}
          ACU limit: ${{ steps.dispatch.outputs.max_acu }}

          Devin is now investigating this issue and will open a PR when ready."
